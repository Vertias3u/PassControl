# gitleaks config for PassControl.
# Extends the default ruleset, but does not flag the committed env TEMPLATES
# (.env.example, .env.docker.example) — they contain only placeholder values by
# design. Real secrets live in .env.local / .env.docker, which are gitignored and
# never committed. This keeps `gitleaks detect` a true pass/fail gate for a
# security-focused repo (contributors + CI won't hit a false positive on the sample).
title = "PassControl gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Placeholders and test fixtures, not real secrets"
paths = [
  '''\.env\.example$''',
  '''\.env\.docker\.example$''',
  # Test files carry dummy secret-shaped fixtures by design (e.g. a 32-byte
  # "previous-secret-…" for the VISA_SECRET length check, "sk-not-ours-…" fake
  # keys). Real secrets never live in tests — they're in gitignored .env files —
  # and scripts/curate-public.sh runs its own independent secret grep over the
  # whole tree as a second layer, so allowlisting fixtures keeps gitleaks a clean
  # pass/fail gate without disabling real detection on shippable code.
  '''tests/.*\.test\.ts$''',
]
